        // ============================================================
        //  BOT AI ENGINE (Optimized for speed)
        // ============================================================
        class ChessBot {
            constructor(difficulty = 'medium') {
                this.difficulty = difficulty;
                // Reduced depth for faster thinking
                this.maxDepth = this.getDepth();
                this.nodesSearched = 0;
                this.bestMove = null;
            }

            getDepth() {
                switch (this.difficulty) {
                    case 'easy':
                        return 1; // Was 2
                    case 'medium':
                        return 2; // Was 3
                    case 'hard':
                        return 3; // Was 4
                    case 'expert':
                        return 3; // Was 5
                    case 'master':
                        return 4; // Was 6
                    default:
                        return 2;
                }
            }

            getDifficultyLabel() {
                const labels = {
                    'easy': '🤓 Easy (Level 1)',
                    'medium': '🧠 Medium (Level 2)',
                    'hard': '🎯 Hard (Level 3)',
                    'expert': '🔥 Expert (Level 3)',
                    'master': '👑 Master (Level 4)'
                };
                return labels[this.difficulty] || labels['medium'];
            }

            getBestMove(board, color) {
                this.nodesSearched = 0;
                this.bestMove = null;

                const isMaximizing = color === WHITE;
                const depth = this.maxDepth;

                const moves = getAllLegalMoves(color, board);
                if (moves.length === 0) return null;

                // For easy difficulty, sometimes make random moves
                if (this.difficulty === 'easy' && Math.random() < 0.4) {
                    return moves[Math.floor(Math.random() * moves.length)];
                }

                let bestScore = -Infinity;
                let bestMove = moves[0];

                // Limit moves for faster thinking
                const moveLimit = this.difficulty === 'master' ? 30 : 20;
                const limitedMoves = moves.slice(0, Math.min(moves.length, moveLimit));

                for (const move of limitedMoves) {
                    const testBoard = cloneBoard(board);
                    const piece = testBoard[move.fromRow][move.fromCol];
                    testBoard[move.toRow][move.toCol] = piece;
                    testBoard[move.fromRow][move.fromCol] = null;

                    if (move.enPassant) {
                        const epRow = piece.color === WHITE ? move.toRow + 1 : move.toRow - 1;
                        testBoard[epRow][move.toCol] = null;
                    }
                    if (move.castling === 'kingSide') {
                        testBoard[move.fromRow][5] = testBoard[move.fromRow][7];
                        testBoard[move.fromRow][7] = null;
                    }
                    if (move.castling === 'queenSide') {
                        testBoard[move.fromRow][3] = testBoard[move.fromRow][0];
                        testBoard[move.fromRow][0] = null;
                    }
                    if (move.promotion) {
                        testBoard[move.toRow][move.toCol] = { type: QUEEN, color: piece.color };
                    }

                    const score = this.minimax(testBoard, depth - 1, -Infinity, Infinity, !isMaximizing, color);

                    if (score > bestScore) {
                        bestScore = score;
                        bestMove = move;
                    }
                }

                this.bestMove = bestMove;
                return bestMove;
            }

            minimax(board, depth, alpha, beta, isMaximizing, botColor) {
                this.nodesSearched++;

                // Early termination for speed
                if (this.nodesSearched > 10000) {
                    return evaluatePosition(board, botColor);
                }

                const moves = getAllLegalMoves(isMaximizing ? (botColor === WHITE ? BLACK : WHITE) : botColor, board);
                if (moves.length === 0) {
                    if (isInCheck(isMaximizing ? (botColor === WHITE ? BLACK : WHITE) : botColor, board)) {
                        return isMaximizing ? -9999 + (this.maxDepth - depth) : 9999 - (this.maxDepth - depth);
                    } else {
                        return 0;
                    }
                }

                if (depth === 0) {
                    return evaluatePosition(board, botColor);
                }

                if (isMaximizing) {
                    let maxEval = -Infinity;
                    const allMoves = getAllLegalMoves(botColor, board);
                    // Sort captures first for better pruning
                    allMoves.sort((a, b) => {
                        const aCapture = board[a.toRow][a.toCol] ? PIECE_VALUES[board[a.toRow][a.toCol].type] : 0;
                        const bCapture = board[b.toRow][b.toCol] ? PIECE_VALUES[board[b.toRow][b.toCol].type] : 0;
                        return bCapture - aCapture;
                    });

                    // Limit moves for speed
                    const moveLimit = this.difficulty === 'master' ? 20 : 15;
                    const limitedMoves = allMoves.slice(0, Math.min(allMoves.length, moveLimit));

                    for (const move of limitedMoves) {
                        const testBoard = cloneBoard(board);
                        const piece = testBoard[move.fromRow][move.fromCol];
                        testBoard[move.toRow][move.toCol] = piece;
                        testBoard[move.fromRow][move.fromCol] = null;

                        if (move.enPassant) {
                            const epRow = piece.color === WHITE ? move.toRow + 1 : move.toRow - 1;
                            testBoard[epRow][move.toCol] = null;
                        }
                        if (move.castling === 'kingSide') {
                            testBoard[move.fromRow][5] = testBoard[move.fromRow][7];
                            testBoard[move.fromRow][7] = null;
                        }
                        if (move.castling === 'queenSide') {
                            testBoard[move.fromRow][3] = testBoard[move.fromRow][0];
                            testBoard[move.fromRow][0] = null;
                        }
                        if (move.promotion) {
                            testBoard[move.toRow][move.toCol] = { type: QUEEN, color: piece.color };
                        }

                        const evalScore = this.minimax(testBoard, depth - 1, alpha, beta, false, botColor);
                        maxEval = Math.max(maxEval, evalScore);
                        alpha = Math.max(alpha, evalScore);
                        if (beta <= alpha) break;
                    }
                    return maxEval;
                } else {
                    let minEval = Infinity;
                    const enemyColor = botColor === WHITE ? BLACK : WHITE;
                    const allMoves = getAllLegalMoves(enemyColor, board);
                    allMoves.sort((a, b) => {
                        const aCapture = board[a.toRow][a.toCol] ? PIECE_VALUES[board[a.toRow][a.toCol].type] : 0;
                        const bCapture = board[b.toRow][b.toCol] ? PIECE_VALUES[board[b.toRow][b.toCol].type] : 0;
                        return bCapture - aCapture;
                    });

                    const moveLimit = this.difficulty === 'master' ? 20 : 15;
                    const limitedMoves = allMoves.slice(0, Math.min(allMoves.length, moveLimit));

                    for (const move of limitedMoves) {
                        const testBoard = cloneBoard(board);
                        const piece = testBoard[move.fromRow][move.fromCol];
                        testBoard[move.toRow][move.toCol] = piece;
                        testBoard[move.fromRow][move.fromCol] = null;

                        if (move.enPassant) {
                            const epRow = piece.color === WHITE ? move.toRow + 1 : move.toRow - 1;
                            testBoard[epRow][move.toCol] = null;
                        }
                        if (move.castling === 'kingSide') {
                            testBoard[move.fromRow][5] = testBoard[move.fromRow][7];
                            testBoard[move.fromRow][7] = null;
                        }
                        if (move.castling === 'queenSide') {
                            testBoard[move.fromRow][3] = testBoard[move.fromRow][0];
                            testBoard[move.fromRow][0] = null;
                        }
                        if (move.promotion) {
                            testBoard[move.toRow][move.toCol] = { type: QUEEN, color: piece.color };
                        }

                        const evalScore = this.minimax(testBoard, depth - 1, alpha, beta, true, botColor);
                        minEval = Math.min(minEval, evalScore);
                        beta = Math.min(beta, evalScore);
                        if (beta <= alpha) break;
                    }
                    return minEval;
                }
            }
        }

        // ============================================================
        //  BOT MOVE EXECUTION (with thinking indicator)
        // ============================================================
        function showThinkingIndicator(show, depth = 0) {
            const indicator = document.getElementById('botThinkingIndicator');
            const depthInfo = document.getElementById('depthInfo');
            if (indicator) {
                if (show) {
                    indicator.classList.add('active');
                    if (depthInfo) {
                        depthInfo.textContent = `Depth: ${depth}`;
                    }
                } else {
                    indicator.classList.remove('active');
                }
            }
        }

        function makeBotMove() {
            if (isBotThinking || gameOver) return;
            if (gameMode !== 'vs_bot') return;
            if (currentTurn !== botColor) return;

            isBotThinking = true;
            const currentDepth = bot?.maxDepth || 2;
            showThinkingIndicator(true, currentDepth);
            addStatusMessage(`${bot.getDifficultyLabel()} is thinking... 🤔`);

            const turnDot = document.getElementById('turnDot');
            if (turnDot) {
                turnDot.style.animation = 'thinkingPulse 0.5s ease-in-out infinite';
            }

            // Much faster thinking time
            const thinkingTime = Math.max(100, 300 - (bot?.maxDepth || 2) * 30);

            setTimeout(() => {
                const move = bot.getBestMove(board, botColor);

                if (turnDot) {
                    turnDot.style.animation = '';
                }
                showThinkingIndicator(false);

                if (!move) {
                    isBotThinking = false;
                    const state = checkGameState();
                    if (state.gameOver) {
                        gameOver = true;
                        gameResult = state.result;
                        addStatusMessage(gameResult);
                        updateUI();
                        renderBoard();
                        sound.play('gameover');
                    }
                    return;
                }

                const isCapture = board[move.toRow][move.toCol] !== null;
                const moveData = makeMoveWithEval(move.fromRow, move.fromCol, move);

                if (isCapture) {
                    moveData.capturedRow = move.toRow;
                    moveData.capturedCol = move.toCol;
                }

                switchTurn();
                selectedSquare = null;
                validMoves = [];

                const state = checkGameState();
                if (state.gameOver) {
                    gameOver = true;
                    gameResult = state.result;
                    sound.play('gameover');
                } else if (inCheck) {
                    sound.play('check');
                } else if (isCapture) {
                    sound.play('capture');
                } else {
                    sound.play('move');
                }

                showMovePopup(moveData);
                renderBoard(moveData);
                isBotThinking = false;

                addStatusMessage(`${bot.getDifficultyLabel()} played ${moveData.notation}`);

                if (!gameOver && currentTurn === botColor) {
                    setTimeout(() => makeBotMove(), 300);
                }
            }, thinkingTime);
        }

        // ============================================================
        //  START BOT GAME
        // ============================================================
        function startBotGame(difficulty = 'medium', playerColor = WHITE) {
            bot = new ChessBot(difficulty);
            botColor = playerColor === WHITE ? BLACK : WHITE;
            gameMode = 'vs_bot';

            initBoard();
            selectedSquare = null;
            validMoves = [];
            gameOver = false;
            gameResult = '';
            inCheck = false;
            lastMove = null;
            drawOffered = false;
            isBotThinking = false;

            currentTurn = WHITE;

            // Reset board rotation
            const boardEl = document.getElementById('chessboard');
            if (boardEl) {
                boardEl.classList.remove('rotated');
            }

            renderBoard();
            updateUI();

            // Update depth info
            const depthInfo = document.getElementById('depthInfo');
            if (depthInfo) {
                depthInfo.textContent = `Depth: ${bot.maxDepth}`;
            }

            addStatusMessage(`Playing vs ${bot.getDifficultyLabel()}! You are ${playerColor === WHITE ? 'White' : 'Black'} ♟️`);

            if (botColor === WHITE) {
                setTimeout(() => makeBotMove(), 400);
            }
        }

        // ============================================================
        //  CAPTURE ANIMATIONS
        // ============================================================
        function createCaptureAnimation(square) {
            const flash = document.createElement('div');
            flash.style.cssText = `
                    position: absolute;
                    top: 0; left: 0;
                    width: 100%; height: 100%;
                    pointer-events: none;
                    z-index: 10;
                    background: rgba(255,255,255,0.5);
                    animation: flashBang 0.3s ease forwards;
                `;
            square.appendChild(flash);

            const colors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bb5', '#ff9f43', '#a29bfe'];
            for (let i = 0; i < 25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 120;
                const px = Math.cos(angle) * distance;
                const py = Math.sin(angle) * distance;
                const particle = document.createElement('div');
                particle.style.cssText = `
                        position: absolute;
                        width: ${4 + Math.random() * 10}px;
                        height: ${4 + Math.random() * 10}px;
                        border-radius: 50%;
                        pointer-events: none;
                        z-index: 50;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        left: 50%;
                        top: 50%;
                        transform: translate(-50%, -50%);
                        animation: particleExplode 0.7s ease forwards;
                        --px: ${px}px;
                        --py: ${py}px;
                    `;
                square.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }

            square.style.animation = 'shake 0.3s ease';
            setTimeout(() => {
                square.style.animation = '';
            }, 300);

            setTimeout(() => flash.remove(), 400);
            sound.play('capture');
        }

        // ============================================================
        //  MOVE POPUP
        // ============================================================
        function showMovePopup(moveData) {
            const popup = document.createElement('div');
            popup.className = 'move-popup';

            const evalInfo = EVAL_LABELS[moveData.evaluation] || { label: 'Good', sound: 'move' };

            const square = document.querySelector(`[data-row="${moveData.toRow}"][data-col="${moveData.toCol}"]`);
            if (!square) return;

            const rect = square.getBoundingClientRect();
            const x = rect.left + rect.width / 2;
            const y = rect.top;

            popup.style.left = x + 'px';
            popup.style.top = y + 'px';
            popup.style.transform = 'translate(-50%, -50%)';

            const notation = moveData.notation;
            const evalLabel = evalInfo.label;

            popup.innerHTML = `
                    <span style="font-size:32px;">${notation}</span>
                    <span class="eval-badge ${moveData.evaluation}">${evalLabel}</span>
                `;

            document.body.appendChild(popup);

            if (moveData.evaluation === 'brilliant') {
                sound.play('brilliant');
            }

            setTimeout(() => {
                popup.remove();
            }, 1300);
        }

        // ============================================================
        //  RENDER BOARD
        // ============================================================
        function renderBoard(animateData = null) {
            const boardEl = document.getElementById('chessboard');
            if (!boardEl) return;
            boardEl.innerHTML = '';

            const isRotated = boardEl.classList.contains('rotated');

            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    const isLight = (row + col) % 2 === 0;
                    square.className = `square ${isLight ? 'light' : 'dark'}`;
                    square.dataset.row = row;
                    square.dataset.col = col;

                    if (lastMove) {
                        if ((lastMove.fromRow === row && lastMove.fromCol === col) ||
                            (lastMove.toRow === row && lastMove.toCol === col)) {
                            square.classList.add(isLight ? 'last-move-light' : 'last-move-dark');
                        }
                    }

                    if (inCheck) {
                        const king = findKing(currentTurn, board);
                        if (king && king.row === row && king.col === col) {
                            square.classList.add(isLight ? 'in-check-light' : 'in-check-dark');
                            square.classList.add('in-check');
                        }
                    }

                    if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
                        square.classList.add('selected');
                    }

                    const isValid = validMoves.some(m => m.row === row && m.col === col);
                    if (isValid) {
                        const target = board[row][col];
                        if (target) {
                            square.classList.add('valid-capture');
                        } else {
                            square.classList.add('valid-move');
                        }
                    }

                    if (row === (isRotated ? 7 : 0)) {
                        const coord = document.createElement('span');
                        coord.className = 'coords coords-file';
                        coord.textContent = 'abcdefgh'[col];
                        square.appendChild(coord);
                    }
                    if (col === 0) {
                        const coord = document.createElement('span');
                        coord.className = 'coords coords-rank';
                        coord.textContent = isRotated ? row + 1 : 8 - row;
                        square.appendChild(coord);
                    }

                    const piece = board[row][col];
                    if (piece) {
                        const pieceEl = document.createElement('span');
                        pieceEl.className = `piece ${piece.color}-piece`;
                        pieceEl.textContent = PIECES[piece.color][piece.type];
                        pieceEl.draggable = false;

                        if (animateData) {
                            if (animateData.toRow === row && animateData.toCol === col) {
                                pieceEl.classList.add('piece-moving');
                            }
                            if (animateData.captured && animateData.capturedRow === row && animateData.capturedCol ===
                                col) {
                                pieceEl.classList.add('capturing');
                                setTimeout(() => {
                                    createCaptureAnimation(square);
                                }, 50);
                            }
                        }

                        square.appendChild(pieceEl);
                    }

                    boardEl.appendChild(square);
                }
            }

            const existingOverlay = boardEl.querySelector('.game-over-overlay');
            if (existingOverlay) existingOverlay.remove();

            if (gameOver && gameResult) {
                const overlay = document.createElement('div');
                overlay.className = 'game-over-overlay';
                const emoji = gameResult.includes('Checkmate') ? '👑' :
                    gameResult.includes('Draw') ? '🤝' :
                    gameResult.includes('time') ? '⏰' : '🏆';
                overlay.innerHTML = `
                        <div class="emoji">${emoji}</div>
                        <div class="result">${gameResult}</div>
                    `;
                boardEl.appendChild(overlay);
            }

            updateUI();
        }

        // ============================================================
        //  UPDATE UI
        // ============================================================
        function updateUI() {
            const moveListEl = document.getElementById('moveList');
            if (moveListEl) {
                moveListEl.innerHTML = '';

                for (let i = 0; i < moveHistory.length; i += 2) {
                    const row = document.createElement('div');
                    row.className = 'move-row';

                    const num = document.createElement('span');
                    num.className = 'move-number';
                    num.textContent = Math.floor(i / 2) + 1 + '.';
                    row.appendChild(num);

                    const whiteMove = document.createElement('span');
                    whiteMove.className = 'move-white';
                    whiteMove.textContent = moveHistory[i].notation || '...';

                    if (moveHistory[i].evaluation) {
                        const badge = document.createElement('span');
                        badge.className = `move-eval ${moveHistory[i].evaluation}`;
                        badge.textContent = EVAL_LABELS[moveHistory[i].evaluation].label;
                        whiteMove.appendChild(badge);
                    }

                    row.appendChild(whiteMove);

                    if (i + 1 < moveHistory.length) {
                        const blackMove = document.createElement('span');
                        blackMove.className = 'move-black';
                        blackMove.textContent = moveHistory[i + 1].notation || '...';

                        if (moveHistory[i + 1].evaluation) {
                            const badge = document.createElement('span');
                            badge.className = `move-eval ${moveHistory[i + 1].evaluation}`;
                            badge.textContent = EVAL_LABELS[moveHistory[i + 1].evaluation].label;
                            blackMove.appendChild(badge);
                        }

                        row.appendChild(blackMove);
                    }

                    moveListEl.appendChild(row);
                }

                moveListEl.scrollTop = moveListEl.scrollHeight;
            }

            const dot = document.getElementById('turnDot');
            const statusText = document.getElementById('statusText');
            const checkIndicator = document.getElementById('checkIndicator');
            const capturedEl = document.getElementById('capturedPieces');

            if (dot) dot.className = `dot ${currentTurn}`;

            if (!gameOver) {
                const state = checkGameState();
                if (state.gameOver) {
                    gameOver = true;
                    gameResult = state.result;
                    if (statusText) statusText.innerHTML = state.result;
                    if (checkIndicator) checkIndicator.textContent = state.emoji;
                } else if (state.result === 'Check!') {
                    if (statusText) statusText.innerHTML = `${currentTurn === WHITE ? 'White' : 'Black'} is in <span class="check">Check!</span>`;
                    if (checkIndicator) checkIndicator.textContent = '⚠️';
                } else {
                    if (statusText) statusText.innerHTML = `${currentTurn === WHITE ? 'White' : 'Black'}'s turn`;
                    if (checkIndicator) checkIndicator.textContent = '';
                }
            }

            if (capturedEl) {
                const whiteSymbols = capturedWhite.map(p => PIECES[p.color][p.type]).join('');
                const blackSymbols = capturedBlack.map(p => PIECES[p.color][p.type]).join('');
                capturedEl.innerHTML = `
                        <span style="color:#fff">${whiteSymbols}</span>
                        <span style="color:#888;margin:0 4px;">|</span>
                        <span style="color:#888">${blackSymbols}</span>
                    `;
            }

            const summaryEl = document.getElementById('evalSummary');
            if (summaryEl) {
                const labels = {
                    'brilliant': '⭐',
                    'great': '🔥',
                    'best': '★',
                    'excellent': '✅',
                    'good': '👍',
                    'book': '📚',
                    'inaccuracy': '⚠️',
                    'mistake': '❌',
                    'blunder': '💀',
                    'missed': '🎯'
                };
                let summaryHTML = '<span style="color:#666;">Evaluation Stats:</span> ';
                for (const [key, value] of Object.entries(evalStats)) {
                    if (value > 0) {
                        summaryHTML += `<span class="stat">${labels[key] || key} ${value}</span> `;
                    }
                }
                summaryEl.innerHTML = summaryHTML || '<span style="color:#666;">Evaluation Stats: No moves played yet</span>';
            }

            const drawBtn = document.querySelector('.action-buttons .draw');
            if (drawBtn) {
                if (drawOffered) {
                    drawBtn.textContent = '✅ Accept Draw';
                    drawBtn.classList.add('active');
                } else {
                    drawBtn.textContent = '🤝 Offer Draw';
                    drawBtn.classList.remove('active');
                }
            }

            updateTimerDisplay();
        }

        // ============================================================
        //  UI CONTROLS
        // ============================================================
        function initGameControls() {
            const botContainer = document.getElementById('botControls');
            if (botContainer) {
                const label = document.createElement('span');
                label.textContent = '🤖 Bot:';
                label.style.cssText = 'color: #888; font-size: 12px; display: flex; align-items: center; margin-right: 4px;';
                botContainer.appendChild(label);

                const difficulties = [
                    { id: 'easy', label: 'Easy', emoji: '🤓' },
                    { id: 'medium', label: 'Medium', emoji: '🧠' },
                    { id: 'hard', label: 'Hard', emoji: '🎯' },
                    { id: 'expert', label: 'Expert', emoji: '🔥' },
                    { id: 'master', label: 'Master', emoji: '👑' }
                ];

                difficulties.forEach(diff => {
                    const btn = document.createElement('button');
                    btn.textContent = `${diff.emoji}`;
                    btn.title = diff.label;
                    btn.dataset.difficulty = diff.id;
                    btn.addEventListener('click', () => {
                        const colorChoice = confirm(`Play as White or Black?\nClick OK for White, Cancel for Black`);
                        startBotGame(diff.id, colorChoice ? WHITE : BLACK);

                        document.querySelectorAll('#botControls button').forEach(b => {
                            b.classList.remove('active');
                        });
                        btn.classList.add('active');

                        const pvpBtn = document.querySelector('#botControls .pvp-btn');
                        if (pvpBtn) pvpBtn.classList.remove('active');
                    });
                    botContainer.appendChild(btn);
                });

                const pvpBtn = document.createElement('button');
                pvpBtn.textContent = '👥';
                pvpBtn.title = 'Player vs Player';
                pvpBtn.className = 'pvp-btn active';
                pvpBtn.addEventListener('click', () => {
                    gameMode = 'pvp';
                    bot = null;
                    initBoard();
                    selectedSquare = null;
                    validMoves = [];
                    gameOver = false;
                    gameResult = '';
                    inCheck = false;
                    lastMove = null;
                    drawOffered = false;
                    isBotThinking = false;
                    currentTurn = WHITE;
                    const boardEl = document.getElementById('chessboard');
                    if (boardEl) boardEl.classList.remove('rotated');
                    showThinkingIndicator(false);
                    renderBoard();
                    updateUI();
                    addStatusMessage('👥 Player vs Player mode');

                    document.querySelectorAll('#botControls button').forEach(b => {
                        b.classList.remove('active');
                    });
                    pvpBtn.classList.add('active');
                });
                botContainer.appendChild(pvpBtn);
            }

            const actionContainer = document.getElementById('actionButtons');
            if (actionContainer) {
                const resignBtn = document.createElement('button');
                resignBtn.className = 'resign';
                resignBtn.textContent = '🏳️ Resign';
                resignBtn.addEventListener('click', resignGame);
                actionContainer.appendChild(resignBtn);

                const drawBtn = document.createElement('button');
                drawBtn.className = 'draw';
                drawBtn.textContent = '🤝 Offer Draw';
                drawBtn.addEventListener('click', () => {
                    if (gameOver) return;
                    if (drawOffered) {
                        acceptDraw();
                    } else {
                        offerDraw();
                    }
                });
                actionContainer.appendChild(drawBtn);
            }
        }

        // ============================================================
        //  CLICK HANDLER
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            const boardEl = document.getElementById('chessboard');
            if (boardEl) {
                boardEl.addEventListener('click', (e) => {
                    const square = e.target.closest('.square');
                    if (!square) return;

                    const row = parseInt(square.dataset.row);
                    const col = parseInt(square.dataset.col);

                    if (gameOver) return;
                    if (isBotThinking) return;
                    if (gameMode === 'vs_bot' && currentTurn === botColor) return;

                    const piece = board[row][col];

                    const isValidTarget = validMoves.some(m => m.row === row && m.col === col);
                    if (isValidTarget && selectedSquare) {
                        const move = validMoves.find(m => m.row === row && m.col === col);
                        const isCapture = board[row][col] !== null;

                        const capturedRow = isCapture ? row : null;
                        const capturedCol = isCapture ? col : null;

                        const moveData = makeMoveWithEval(selectedSquare.row, selectedSquare.col, move);

                        if (isCapture) {
                            moveData.capturedRow = capturedRow;
                            moveData.capturedCol = capturedCol;
                        }

                        switchTurn();
                        selectedSquare = null;
                        validMoves = [];

                        const state = checkGameState();
                        if (state.gameOver) {
                            gameOver = true;
                            gameResult = state.result;
                            sound.play('gameover');
                        } else if (inCheck) {
                            sound.play('check');
                        } else if (isCapture) {
                            sound.play('capture');
                        } else {
                            sound.play('move');
                        }

                        showMovePopup(moveData);
                        renderBoard(moveData);

                        if (!gameOver && gameMode === 'vs_bot' && currentTurn === botColor) {
                            setTimeout(() => makeBotMove(), 300);
                        }
                        return;
                    }

                    if (piece && piece.color === currentTurn) {
                        const moves = getLegalMoves(row, col, board);
                        if (moves.length > 0) {
                            selectedSquare = { row, col };
                            validMoves = moves;
                            sound.play('movepiece');
                        } else {
                            selectedSquare = null;
                            validMoves = [];
                        }
                    } else {
                        selectedSquare = null;
                        validMoves = [];
                    }

                    renderBoard();
                });
            }

            const resetBtn = document.getElementById('resetBtn');
            if (resetBtn) {
                resetBtn.addEventListener('click', () => {
                    if (timerInterval) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                    }
                    gameMode = 'pvp';
                    bot = null;
                    initBoard();
                    selectedSquare = null;
                    validMoves = [];
                    gameOver = false;
                    gameResult = '';
                    inCheck = false;
                    lastMove = null;
                    drawOffered = false;
                    isBotThinking = false;
                    const boardEl = document.getElementById('chessboard');
                    if (boardEl) boardEl.classList.remove('rotated');
                    showThinkingIndicator(false);
                    renderBoard();
                    sound.play('move');
                    addStatusMessage('👥 Player vs Player mode');

                    document.querySelectorAll('#botControls button').forEach(b => {
                        b.classList.remove('active');
                    });
                    const pvpBtn = document.querySelector('#botControls .pvp-btn');
                    if (pvpBtn) pvpBtn.classList.add('active');
                });
            }

            const undoBtn = document.getElementById('undoBtn');
            if (undoBtn) {
                undoBtn.addEventListener('click', () => {
                    if (isBotThinking) return;
                    if (undoMove()) {
                        selectedSquare = null;
                        validMoves = [];
                        gameOver = false;
                        gameResult = '';
                        inCheck = false;
                        renderBoard();
                        sound.play('move');
                    }
                });
            }

            const soundToggle = document.getElementById('soundToggle');
            if (soundToggle) {
                soundToggle.addEventListener('click', () => {
                    const enabled = sound.toggle();
                    soundToggle.textContent = enabled ? '🔊' : '🔇';
                });
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'r' || e.key === 'R') {
                    resetBtn?.click();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    e.preventDefault();
                    undoBtn?.click();
                }
            });

            initGameControls();

            initBoard();
            renderBoard();
            addStatusMessage('👥 Player vs Player mode');

            console.log('♚ Chess Game Loaded!');
            console.log('🎯 Features:');
            console.log('  • 5 Bot difficulty levels (Easy to Master)');
            console.log('  • Optimized thinking time for faster gameplay');
            console.log('  • Board rotates after each turn');
            console.log('  • Resign & Draw features');
            console.log('  • Capture animations with particles');
            console.log('  • Move popups with evaluations');
            console.log('  • Timer with low-time warning');
            console.log('  • Keyboard shortcuts: R=Reset, Ctrl+Z=Undo');
        });
    </script>
</body>
</html>
